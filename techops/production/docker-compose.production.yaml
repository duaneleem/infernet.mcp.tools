# Run from repo root. Example:
#   docker compose -f techops/production/docker-compose.production.yaml --env-file techops/production/.env up --build
# Or from this directory: docker compose -f docker-compose.production.yaml --env-file .env up --build
#
# Network `infernet` is shared with infernet.openwebui (docker-compose.yaml). Start that stack first,
# or create the network: docker network create infernet

name: infernet-mcp-tools
services:
  mcpo:
    build:
      context: .
      dockerfile: production.Dockerfile
    env_file:
      - .env
    ports:
      # Host port only; mcpo always listens on 8000 inside the container (see environment.MCPO_PORT).
      - "${MCPO_PUBLISH_PORT:-8000}:8000"
    networks:
      - infernet
    environment:
      MCPO_HOST: "0.0.0.0"
      MCPO_PORT: "8000"
    shm_size: "2gb"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read(64)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  infernet:
    external: true
    name: infernet
